<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CC Image Background Remover</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 透明棋盤格背景 */
    .checkerboard {
      background-color: #f3f4f6;
      background-image: 
        linear-gradient(45deg, #e5e7eb 25%, transparent 25%, transparent 75%, #e5e7eb 75%, #e5e7eb),
        linear-gradient(45deg, #e5e7eb 25%, transparent 25%, transparent 75%, #e5e7eb 75%, #e5e7eb);
      background-size: 20px 20px;
      background-position: 0 0, 10px 10px;
    }
    /* 隱藏捲軸但保持可捲動 */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">

  <div class="max-w-7xl mx-auto px-4 py-8 space-y-6">
    
    <header class="text-center space-y-4">
      <h1 class="text-3xl font-bold text-gray-900 tracking-tight">CC Image Background Remover</h1>
      <p class="text-gray-500">搜尋 CC 圖片，選圖，一鍵去背，下載透明 PNG</p>
      
      <div class="flex flex-wrap justify-center gap-4 text-sm mt-4">
        <div class="bg-white px-4 py-2 rounded-lg shadow-sm border border-gray-100"><span class="font-bold text-blue-600 mr-2">Step 1</span>搜尋圖片</div>
        <div class="bg-white px-4 py-2 rounded-lg shadow-sm border border-gray-100"><span class="font-bold text-blue-600 mr-2">Step 2</span>選擇圖片</div>
        <div class="bg-white px-4 py-2 rounded-lg shadow-sm border border-gray-100"><span class="font-bold text-blue-600 mr-2">Step 3</span>去背下載</div>
      </div>
    </header>

    <section class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col space-y-3">
      <div class="flex flex-col md:flex-row gap-3">
        <input type="text" id="searchInput" class="flex-1 bg-gray-50 border border-gray-200 text-gray-900 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block px-4 py-3 outline-none transition" placeholder="輸入關鍵字，例如 cat, robot, flower">
        <button id="searchBtn" onclick="window.searchImages()" class="bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-xl text-sm px-6 py-3 transition w-full md:w-auto">搜尋圖片</button>
        <button id="nextBatchBtn" onclick="window.changeBatch()" class="bg-gray-700 hover:bg-gray-800 text-white font-medium rounded-xl text-sm px-6 py-3 transition w-full md:w-auto">換一批</button>
      </div>
      <div id="statusText" class="text-sm font-medium text-blue-600">等待搜尋中...</div>
    </section>

    <section class="space-y-4">
      <h2 class="text-lg font-bold text-gray-800">搜尋結果 (顯示 5 張)</h2>
      <div id="imageGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4">
        <p class="text-gray-400 text-sm col-span-full">尚未有搜尋結果</p>
      </div>
    </section>

    <section class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col">
        <h3 class="text-md font-bold text-gray-800 mb-3">原圖預覽</h3>
        <div id="originalContainer" class="bg-gray-50 rounded-xl border border-gray-200 flex-1 flex items-center justify-center min-h-[300px] relative overflow-hidden">
          <p id="originalPlaceholder" class="text-gray-400 text-sm pointer-events-none">請先選擇圖片</p>
          <img id="originalPreview" crossorigin="anonymous" class="absolute max-w-full max-h-full object-contain hidden cursor-crosshair" alt="Original Image" onclick="window.pickBackgroundColor(event)">
        </div>
      </div>

      <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col">
        <h3 class="text-md font-bold text-gray-800 mb-3">去背後預覽</h3>
        <div id="resultContainer" class="checkerboard rounded-xl border border-gray-200 flex-1 flex items-center justify-center min-h-[300px] relative overflow-hidden">
          <p id="resultPlaceholder" class="text-gray-400 text-sm pointer-events-none text-center bg-white/70 px-2 rounded">去背結果會顯示在這裡</p>
          <img id="resultPreview" class="absolute max-w-full max-h-full object-contain hidden" alt="Result Image">
        </div>
      </div>

      <div class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col md:flex-row gap-6 justify-between items-center">
        
        <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
          <button id="aiRemoveBtn" onclick="window.removeSelectedImageBackground()" disabled class="bg-blue-600 disabled:bg-gray-300 hover:bg-blue-700 text-white font-medium rounded-xl text-sm px-8 py-3 transition disabled:cursor-not-allowed">一鍵去背</button>
          <button id="downloadBtn" onclick="window.downloadPNG()" disabled class="bg-green-600 disabled:bg-gray-300 hover:bg-green-700 text-white font-medium rounded-xl text-sm px-8 py-3 transition disabled:cursor-not-allowed">下載 PNG</button>
        </div>

        <div class="flex flex-col gap-2 p-4 bg-gray-50 rounded-xl border border-gray-200 w-full md:w-auto">
          <p class="text-xs text-gray-500 font-medium">備用去背 (AI 失敗時可用，適合白底或單色背景)</p>
          <div class="flex flex-wrap items-center gap-2">
            <button onclick="window.fallbackWhiteRemove()" class="bg-gray-700 hover:bg-gray-800 text-white text-xs px-3 py-1.5 rounded-lg transition">白底去背</button>
            <button id="pickColorBtn" onclick="window.enablePickColor()" class="bg-gray-700 hover:bg-blue-600 text-white text-xs px-3 py-1.5 rounded-lg transition">點選背景色去背</button>
            <div class="flex items-center gap-2 ml-2">
              <span class="text-xs text-gray-500">容差:</span>
              <input type="range" id="tolerance" min="0" max="255" value="30" class="w-20">
            </div>
          </div>
        </div>

      </div>
    </section>

    <section class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
      <div id="attributionInfo" class="text-sm text-gray-600 space-y-1">
        <p>尚未選擇圖片</p>
      </div>
      <button id="copyAttrBtn" onclick="window.copyAttribution()" disabled class="bg-gray-700 disabled:bg-gray-300 hover:bg-gray-800 text-white font-medium rounded-xl text-xs px-4 py-2 transition disabled:cursor-not-allowed whitespace-nowrap">複製標示</button>
    </section>

  </div>

  <script type="module">
    // 引入 AI 去背套件
    import { removeBackground } from "https://cdn.jsdelivr.net/npm/@imgly/background-removal/+esm";

    // 全域變數
    let allFetchedImages = [];
    let currentBatchIndex = 0;
    let selectedImage = null;
    let finalBlob = null;
    let isPickingColor = false;

    // DOM 元素快取
    const statusText = document.getElementById('statusText');
    const imageGrid = document.getElementById('imageGrid');
    const originalPreview = document.getElementById('originalPreview');
    const originalPlaceholder = document.getElementById('originalPlaceholder');
    const resultPreview = document.getElementById('resultPreview');
    const resultPlaceholder = document.getElementById('resultPlaceholder');
    const aiRemoveBtn = document.getElementById('aiRemoveBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const attributionInfo = document.getElementById('attributionInfo');
    const copyAttrBtn = document.getElementById('copyAttrBtn');
    const pickColorBtn = document.getElementById('pickColorBtn');
    const searchInput = document.getElementById('searchInput');

    // 讓 HTML onclick 讀得到 function
    window.searchImages = searchImages;
    window.changeBatch = changeBatch;
    window.selectImage = selectImage;
    window.removeSelectedImageBackground = removeSelectedImageBackground;
    window.downloadPNG = downloadPNG;
    window.copyAttribution = copyAttribution;
    window.fallbackWhiteRemove = fallbackWhiteRemove;
    window.enablePickColor = enablePickColor;
    window.pickBackgroundColor = pickBackgroundColor;
    window.fallbackSelectedColorRemove = fallbackSelectedColorRemove;

    // 支援 Enter 鍵搜尋
    searchInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') searchImages();
    });

    /** 1. 更新狀態提示 */
    function showStatus(msg, isError = false) {
      statusText.textContent = msg;
      statusText.className = `text-sm font-medium ${isError ? 'text-red-500' : 'text-blue-600'}`;
    }

    /** 2. 搜尋圖片 */
    async function searchImages() {
      const keyword = searchInput.value.trim();
      if (!keyword) return showStatus("請先輸入關鍵字", true);

      showStatus("搜尋中...");
      allFetchedImages = [];
      currentBatchIndex = 0;
      resetSelection();

      try {
        const [wikiImages, openverseImages] = await Promise.all([
          fetchWikimediaImages(keyword),
          fetchOpenverseImages(keyword)
        ]);

        const combined = [...wikiImages, ...openverseImages];
        allFetchedImages = filterImagesBySize(combined);

        if (allFetchedImages.length === 0) {
          imageGrid.innerHTML = '<p class="text-gray-400 text-sm col-span-full">找不到圖片</p>';
          return showStatus("找不到圖片", true);
        }

        showStatus(`找到 ${allFetchedImages.length} 張圖片`);
        renderImageCards();
      } catch (err) {
        console.error(err);
        showStatus("API 搜尋失敗", true);
      }
    }

    /** 3. 抓取 Wikimedia 圖片 */
    async function fetchWikimediaImages(keyword) {
      try {
        const url = `https://commons.wikimedia.org/w/api.php?action=query&generator=search&gsrsearch=${encodeURIComponent(keyword)}&gsrnamespace=6&gsrlimit=30&prop=imageinfo&iiprop=url|size|extmetadata&format=json&origin=*`;
        const res = await fetch(url);
        const data = await res.json();
        
        if (!data.query || !data.query.pages) return [];
        
        return Object.values(data.query.pages).map(page => {
          const info = page.imageinfo[0];
          const meta = info.extmetadata;
          return {
            title: page.title.replace('File:', ''),
            creator: meta.Artist ? meta.Artist.value.replace(/<[^>]*>?/gm, '') : 'Unknown',
            license: meta.LicenseShortName ? meta.LicenseShortName.value : 'CC',
            licenseUrl: meta.LicenseUrl ? meta.LicenseUrl.value : '',
            imageUrl: info.url,
            thumbnailUrl: info.thumburl || info.url,
            sourceUrl: info.descriptionurl,
            width: info.width,
            height: info.height,
            provider: 'Wikimedia Commons'
          };
        });
      } catch {
        return []; // 失敗不中斷
      }
    }

    /** 4. 抓取 Openverse 圖片 */
    async function fetchOpenverseImages(keyword) {
      try {
        const url = `https://api.openverse.org/v1/images/?q=${encodeURIComponent(keyword)}&page_size=20`;
        const res = await fetch(url);
        const data = await res.json();
        
        if (!data.results) return [];
        
        return data.results.map(item => ({
          title: item.title,
          creator: item.creator || 'Unknown',
          license: item.license.toUpperCase(),
          licenseUrl: item.license_url,
          imageUrl: item.url,
          thumbnailUrl: item.thumbnail || item.url,
          sourceUrl: item.foreign_landing_url,
          width: item.width || 0,
          height: item.height || 0,
          provider: 'Openverse'
        }));
      } catch {
        return []; // 失敗不中斷
      }
    }

    /** 5. 篩選尺寸 */
    function filterImagesBySize(images) {
      return images.filter(img => img.width >= 800 && img.height >= 600);
    }

    /** 6. 渲染卡片 */
    function renderImageCards() {
      imageGrid.innerHTML = '';
      const batch = allFetchedImages.slice(currentBatchIndex, currentBatchIndex + 5);
      
      batch.forEach((img, idx) => {
        const actualIdx = currentBatchIndex + idx;
        const card = document.createElement('div');
        card.id = `img-card-${actualIdx}`;
        card.className = "bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm hover:shadow-md transition flex flex-col relative cursor-pointer";
        card.onclick = () => selectImage(actualIdx);

        card.innerHTML = `
          <div id="badge-${actualIdx}" class="hidden absolute top-2 left-2 bg-blue-500 text-white text-xs px-2 py-1 rounded shadow z-10">已選取</div>
          <div class="h-40 overflow-hidden bg-gray-100 flex items-center justify-center">
            <img src="${img.thumbnailUrl}" class="w-full h-full object-cover" alt="Thumbnail" loading="lazy">
          </div>
          <div class="p-3 flex flex-col flex-1">
            <h4 class="text-sm font-bold text-gray-800 truncate" title="${img.title}">${img.title}</h4>
            <p class="text-xs text-gray-500 mt-1">${img.license}</p>
            <p class="text-xs text-gray-400 mb-2">${img.width} × ${img.height}</p>
            <div class="mt-auto flex justify-between items-center pt-2 border-t border-gray-100">
              <button class="text-xs bg-blue-50 text-blue-600 px-3 py-1.5 rounded font-medium hover:bg-blue-100 transition">選擇</button>
              <a href="${img.sourceUrl}" target="_blank" onclick="event.stopPropagation()" class="text-xs text-gray-400 hover:text-blue-500 underline">來源</a>
            </div>
          </div>
        `;
        imageGrid.appendChild(card);
      });
    }

    /** 7. 換一批 */
    function changeBatch() {
      if (allFetchedImages.length === 0) return;
      currentBatchIndex += 5;
      if (currentBatchIndex >= allFetchedImages.length) currentBatchIndex = 0;
      renderImageCards();
      resetSelection();
    }

    /** 8. 重設選擇狀態 */
    function resetSelection() {
      selectedImage = null;
      finalBlob = null;
      isPickingColor = false;
      
      originalPreview.classList.add('hidden');
      originalPreview.src = '';
      originalPlaceholder.classList.remove('hidden');
      
      resultPreview.classList.add('hidden');
      resultPreview.src = '';
      resultPlaceholder.classList.remove('hidden');
      resultPlaceholder.textContent = '去背結果會顯示在這裡';
      
      aiRemoveBtn.disabled = true;
      downloadBtn.disabled = true;
      copyAttrBtn.disabled = true;
      aiRemoveBtn.textContent = '一鍵去背';
      
      attributionInfo.innerHTML = '<p>尚未選擇圖片</p>';
      pickColorBtn.classList.replace('bg-blue-600', 'bg-gray-700');
    }

    /** 9. 選擇圖片 */
    function selectImage(index) {
      document.querySelectorAll('[id^="img-card-"]').forEach(el => el.classList.remove('ring-2', 'ring-blue-500'));
      document.querySelectorAll('[id^="badge-"]').forEach(el => el.classList.add('hidden'));
      
      document.getElementById(`img-card-${index}`).classList.add('ring-2', 'ring-blue-500');
      document.getElementById(`badge-${index}`).classList.remove('hidden');

      selectedImage = allFetchedImages[index];
      showStatus("已選取圖片");
      loadSelectedImage();
    }

    /** 10. 載入選擇的圖片至預覽區 */
    function loadSelectedImage() {
      if (!selectedImage) return;

      originalPreview.src = selectedImage.imageUrl;
      originalPreview.onload = () => {
        originalPlaceholder.classList.add('hidden');
        originalPreview.classList.remove('hidden');
        aiRemoveBtn.disabled = false;
      };
      originalPreview.onerror = () => {
        showStatus("圖片載入失敗，CORS 不允許或連結失效", true);
        originalPlaceholder.textContent = '圖片無法處理，請換一張';
      };

      attributionInfo.innerHTML = `
        <p><span class="font-bold">圖片：</span>${selectedImage.title}</p>
        <p><span class="font-bold">作者：</span>${selectedImage.creator}</p>
        <p><span class="font-bold">授權：</span><a href="${selectedImage.licenseUrl}" target="_blank" class="text-blue-500 underline">${selectedImage.license}</a></p>
        <p><span class="font-bold">來源：</span><a href="${selectedImage.sourceUrl}" target="_blank" class="text-blue-500 underline">連結</a></p>
        <p><span class="font-bold">平台：</span>${selectedImage.provider}</p>
      `;
      copyAttrBtn.disabled = false;
    }

    /** 11. 執行 AI 去背 */
    async function removeSelectedImageBackground() {
      if (!selectedImage) return showStatus("請先選擇圖片", true);
      
      showStatus("處理中...");
      aiRemoveBtn.disabled = true;
      aiRemoveBtn.textContent = '去背中...';
      
      try {
        const response = await fetch(selectedImage.imageUrl);
        const blob = await response.blob();
        
        const resultBlob = await removeBackground(blob);
        showRemovedResult(resultBlob);
      } catch (err) {
        console.error(err);
        showStatus("AI 去背失敗", true);
        aiRemoveBtn.disabled = false;
        aiRemoveBtn.textContent = '一鍵去背';
      }
    }

    /** 12. 顯示去背結果 */
    function showRemovedResult(blob) {
      finalBlob = blob;
      const url = URL.createObjectURL(blob);
      
      resultPreview.src = url;
      resultPlaceholder.classList.add('hidden');
      resultPreview.classList.remove('hidden');
      
      showStatus("去背完成");
      aiRemoveBtn.textContent = '一鍵去背';
      aiRemoveBtn.disabled = false;
      downloadBtn.disabled = false;
    }

    /** 13. 下載去背結果 */
    function downloadPNG() {
      if (!finalBlob) return showStatus("尚未去背就下載", true);
      
      const url = URL.createObjectURL(finalBlob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'cc-image-removed-background.png';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    /** 14. 複製標示 */
    function copyAttribution() {
      if (!selectedImage) return showStatus("尚未選擇圖片", true);
      
      const text = `圖片：${selectedImage.title}\n作者：${selectedImage.creator}\n授權：${selectedImage.license}\n來源：${selectedImage.sourceUrl}\n平台：${selectedImage.provider}`;
      navigator.clipboard.writeText(text).then(() => {
        showStatus("已複製授權標示");
      }).catch(() => {
        showStatus("複製標示失敗", true);
      });
    }

    /** 15. Canvas 白底去背 */
    function fallbackWhiteRemove() {
      fallbackSelectedColorRemove([255, 255, 255]);
    }

    /** 16. 啟用選色器模式 */
    function enablePickColor() {
      if (!selectedImage) return showStatus("請先選擇圖片", true);
      isPickingColor = true;
      pickColorBtn.classList.replace('bg-gray-700', 'bg-blue-600');
      showStatus("請在左側原圖點擊要去除的背景顏色");
    }

    /** 17. 點擊圖片取得顏色 */
    function pickBackgroundColor(event) {
      if (!isPickingColor || !selectedImage) return;
      
      const img = event.target;
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      ctx.drawImage(img, 0, 0);

      // 計算點擊的真實圖片坐標
      const rect = img.getBoundingClientRect();
      const scaleX = img.naturalWidth / rect.width;
      const scaleY = img.naturalHeight / rect.height;
      
      const x = (event.clientX - rect.left) * scaleX;
      const y = (event.clientY - rect.top) * scaleY;

      try {
        const pixel = ctx.getImageData(x, y, 1, 1).data;
        const color = [pixel[0], pixel[1], pixel[2]];
        isPickingColor = false;
        pickColorBtn.classList.replace('bg-blue-600', 'bg-gray-700');
        showStatus("已選取背景色，處理中...");
        
        fallbackSelectedColorRemove(color);
      } catch {
        showStatus("CORS 不允許處理圖片", true);
        isPickingColor = false;
        pickColorBtn.classList.replace('bg-blue-600', 'bg-gray-700');
      }
    }

    /** 18. Canvas 指定顏色去背邏輯 */
    function fallbackSelectedColorRemove(targetColor) {
      if (!selectedImage) return showStatus("請先選擇圖片", true);
      
      const img = originalPreview;
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      
      try {
        ctx.drawImage(img, 0, 0);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        const tolerance = parseInt(document.getElementById('tolerance').value, 10);
        
        const [tr, tg, tb] = targetColor;

        for (let i = 0; i < data.length; i += 4) {
          const r = data[i];
          const g = data[i+1];
          const b = data[i+2];
          
          if (Math.abs(r - tr) <= tolerance && Math.abs(g - tg) <= tolerance && Math.abs(b - tb) <= tolerance) {
            data[i+3] = 0; // Alpha 透明
          }
        }
        
        ctx.putImageData(imageData, 0, 0);
        
        canvas.toBlob((blob) => {
          showRemovedResult(blob);
          showStatus("備用去背完成");
        }, 'image/png');
        
      } catch (err) {
        showStatus("CORS 不允許處理圖片", true);
      }
    }
  </script>
</body>
</html>
